<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>
  
  <!-- Pickaxe handle -->
  <line x1="160" y1="352" x2="352" y2="160" stroke="#8B6914" stroke-width="32" stroke-linecap="round"/>
  
  <!-- Pickaxe head -->
  <polygon points="352,100 420,100 420,140 380,140 380,180 340,180 340,140 352,140" fill="#888" stroke="#666" stroke-width="4"/>
  <polygon points="280,160 352,160 352,180 280,180" fill="#aaa" stroke="#888" stroke-width="3"/>
  
  <!-- Diamond tip -->
  <polygon points="420,100 460,80 440,120" fill="#4ade80" stroke="#22c55e" stroke-width="3"/>
  
  <!-- Bridge arc below -->
  <path d="M100,420 Q256,340 412,420" fill="none" stroke="#4ade80" stroke-width="16" stroke-linecap="round"/>
  <path d="M140,440 Q256,380 372,440" fill="none" stroke="#0f3460" stroke-width="12" stroke-linecap="round"/>
</svg>
